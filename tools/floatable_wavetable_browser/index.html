<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    >
    <title>Floatable AKWF Curator</title>
    <meta
      name="description"
      content="Browse Adventure Kid single-cycle waves, curate 16 slots, audition morphs, and export a bank."
    >
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="minimal-page">
    <main class="app-shell minimal-layout">
      <section class="panel library-panel simplified-library-panel">
        <div class="panel-bar library-panel-bar">
          <h1 class="panel-title">Library</h1>
          <div class="panel-bar-actions">
            <button id="randomTargetButton" class="secondary-button" type="button">Random Target</button>
            <button id="randomAllButton" class="primary-button" type="button">Random 16</button>
          </div>
          <p id="resultsSummary" class="info-text">Loading library...</p>
        </div>

        <div class="library-controls simplified-library-controls">
          <section class="category-filter">
            <details id="categoryFilterDetails" class="category-disclosure">
              <summary class="category-summary">
                <span class="control-label">Categories</span>
                <span id="categorySummary" class="slider-readout">All categories</span>
              </summary>

              <div class="category-panel">
                <div class="field-header">
                  <span class="info-text">Select any</span>
                  <button id="resetCategoryFiltersButton" class="ghost-button" type="button">All</button>
                </div>

                <div id="categoryList" class="category-list" aria-live="polite"></div>
              </div>
            </details>
          </section>

          <section class="filter-panel">
            <div class="filter-grid simplified-filter-grid">
              <section class="slider-filter">
                <div class="field-header">
                  <span class="control-label">Zero X</span>
                  <span id="zeroCrossReadout" class="slider-readout">0-0</span>
                </div>
                <div class="dual-range-slider">
                  <div class="slider-track"></div>
                  <div id="zeroCrossRangeFill" class="slider-fill"></div>
                  <input id="zeroCrossMinInput" class="range-input range-input-min" type="range" data-slider-group="zeroCrossings" data-range-role="min">
                  <input id="zeroCrossMaxInput" class="range-input range-input-max" type="range" data-slider-group="zeroCrossings" data-range-role="max">
                </div>
              </section>

              <section class="slider-filter">
                <div class="field-header">
                  <span class="control-label">Brightness</span>
                  <span id="brightnessReadout" class="slider-readout">0-100%</span>
                </div>
                <div class="dual-range-slider">
                  <div class="slider-track"></div>
                  <div id="brightnessRangeFill" class="slider-fill"></div>
                  <input id="brightnessMinInput" class="range-input range-input-min" type="range" data-slider-group="brightness" data-range-role="min">
                  <input id="brightnessMaxInput" class="range-input range-input-max" type="range" data-slider-group="brightness" data-range-role="max">
                </div>
              </section>

              <label class="control-field">
                <span class="control-label">Sort</span>
                <select id="sortSelect" class="select-input">
                  <option value="name">Name</option>
                  <option value="brightness_desc">Brightness: High to Low</option>
                  <option value="brightness_asc">Brightness: Low to High</option>
                  <option value="zero_crossings_asc">Zero Crossings: Low to High</option>
                  <option value="zero_crossings_desc">Zero Crossings: High to Low</option>
                </select>
              </label>
            </div>
          </section>
        </div>

        <div id="libraryResults" class="library-results" aria-live="polite"></div>
      </section>

      <section class="panel slots-panel simplified-slots-panel">
        <div class="panel-bar slots-panel-bar">
          <h2 class="panel-title">Slots</h2>
          <div class="panel-bar-actions">
            <button
              id="playMorphButtonTop"
              class="primary-button"
              type="button"
              data-morph-trigger="true"
            >Play Morph Sweep</button>
          </div>
          <p class="info-text">Click to target. Drag to swap.</p>
        </div>

        <div id="slotGrid" class="slot-grid" aria-live="polite"></div>

        <section class="minimal-slot-footer">
          <div class="panel-bar minimal-slot-footer-bar">
            <h3 class="panel-title">Audition / Export</h3>
            <p id="statusLine" class="info-text">Loading library...</p>
          </div>

          <div class="controls-grid controls-grid-audio minimal-transport-controls">
            <label class="control-field">
              <span class="control-label">Audition Pitch (Hz)</span>
              <input id="previewPitchInput" class="text-input" type="number" min="20" max="880" step="1" value="110">
            </label>
          </div>

          <div class="action-row minimal-transport-actions">
            <button id="previewTargetSlotButton" class="primary-button" type="button">Preview Target Slot</button>
            <button id="stopPlaybackButton" class="secondary-button" type="button">Stop</button>
            <button id="exportJsonButton" class="secondary-button" type="button">Export Selection JSON</button>
            <button id="exportWavButton" class="secondary-button" type="button">Export Bank WAV</button>
          </div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
